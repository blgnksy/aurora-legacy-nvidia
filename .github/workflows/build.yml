name: Build Aurora Legacy NVIDIA 

on: 
  workflow_dispatch: 
  schedule: - cron: '0 */6 * * *' 
  push: 
    branches: 
      - master 

permissions: 
  contents: read 
  packages: write 

jobs: 
  build: 
    runs-on: ubuntu-latest 
    
    steps: 
      - uses: actions/checkout@v4 
      
      - name: Login to GHCR 
        uses: docker/login-action@v3 
        with: 
          registry: ghcr.io 
          username: ${{ github.actor }} 
          password: ${{ secrets.GITHUB_TOKEN }} 
      
      - name: Build image 
        run: | 
        docker build \ 
          -t ghcr.io/${{ github.repository_owner }}/aurora-legacy-nvidia:latest \ 
          . 
      
      - name: Push image 
        run: | 
          docker push \ ghcr.io/${{ github.repository_owner }}/aurora-legacy-nvidia:latest
          