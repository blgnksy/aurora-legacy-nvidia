name: Build Disk Image

on:
  workflow_run:
    workflows: ["Build Aurora DX Legacy NVIDIA"]
    types:
      - completed
  workflow_dispatch:

permissions:
  contents: read
  packages: write

jobs:
  build-disk:
    runs-on: ubuntu-latest
    if: ${{ github.event_name == 'workflow_dispatch' || github.event.workflow_run.conclusion == 'success' }}

    steps:
      - name: Free up disk space
        run: |
          sudo rm -rf /usr/share/dotnet /usr/local/lib/android /opt/ghc /usr/local/share/boost
          df -h

      - name: Login to GHCR
        run: |
          sudo podman login ghcr.io \
            --username ${{ github.actor }} \
            --password ${{ secrets.GITHUB_TOKEN }}

      - name: Pull container image
        run: |
          sudo podman pull ghcr.io/${{ github.repository_owner }}/aurora-dx-legacy-nvidia:latest

      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Build installer ISO
        run: |
          mkdir -p output
          sudo podman run \
            --rm \
            --privileged \
            --pull=newer \
            --security-opt label=type:unconfined_t \
            -v $(pwd)/output:/output \
            -v /var/lib/containers/storage:/var/lib/containers/storage \
            -v $(pwd)/build_files/installer-config.toml:/config.toml:ro \
            quay.io/centos-bootc/bootc-image-builder:latest \
            --type anaconda-iso \
            --rootfs xfs \
            --config /config.toml \
            ghcr.io/${{ github.repository_owner }}/aurora-dx-legacy-nvidia:latest

      - name: Install ORAS
        uses: oras-project/setup-oras@v1

      - name: Push ISO to GHCR
        run: |
          oras push \
            --username ${{ github.actor }} \
            --password ${{ secrets.GITHUB_TOKEN }} \
            ghcr.io/${{ github.repository_owner }}/aurora-dx-legacy-nvidia-iso:latest \
            output/bootiso/install.iso:application/x-iso9660-image
